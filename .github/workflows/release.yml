name: Go Release Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -o codex-app ./cmd/codex-app
      - name: Smoke
        run: |
          ./codex-app help
          ./codex-app doctor
          ./codex-app serve --dry-run
